{% extends 'base.html' %}

{% block title %}Placement Cell Homepage{% endblock %}

{% block content %}

    <!-- Container for the page content -->
    <div class="container mt-5">
        <h1 class="text-center mb-4">Post a Job Opening</h1>

        <!-- Job Posting Form -->
        <form method="POST">
            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" class="form-control" id="title" name="title" required placeholder="Enter Job Title">
            </div>

            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" class="form-control" id="company" name="company" required placeholder="Enter Company Name">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" class="form-control" id="location" name="location" required placeholder="Enter Job Location">
            </div>

            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea class="form-control" id="description" name="description" rows="4" required placeholder="Describe the job responsibilities and role"></textarea>
            </div>

            <div class="form-group">
                <label for="requirements">Job Requirements</label>
                <textarea class="form-control" id="requirements" name="requirements" rows="4" required placeholder="List the job requirements (e.g., skills, qualifications)"></textarea>
            </div>

            <div class="form-group">
                <label for="salary">Salary</label>
                <input type="text" class="form-control" id="salary" name="salary" required placeholder="Enter the salary (e.g., $50,000/year)">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary btn-block">Post Job</button>
        </form>

        <!-- Back to Listings link -->
        <hr>
        <a href="{{ url_for('index') }}" class="btn btn-link">Back to Home</a>
    </div>
{% endblock %}
